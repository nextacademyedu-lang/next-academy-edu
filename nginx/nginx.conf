upstream nextapp {
    server app:3001;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name nextacademyedu.com www.nextacademyedu.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name nextacademyedu.com www.nextacademyedu.com;

    ssl_certificate     /etc/letsencrypt/live/nextacademyedu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nextacademyedu.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Max upload size (for media uploads)
    client_max_body_size 25M;

    # Proxy to Next.js
    location / {
        proxy_pass         http://nextapp;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Cache static assets
    location /_next/static/ {
        proxy_pass http://nextapp;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
