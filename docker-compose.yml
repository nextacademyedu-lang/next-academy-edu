services:
  postgres:
    image: postgres:16-alpine
    container_name: nextacademy-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nextacademy
      POSTGRES_PASSWORD: nextacademy_dev
      POSTGRES_DB: nextacademy
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
