services:

  postgres:
    image: postgres:16-alpine
    container_name: nextacademy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-twenty-db.sh:/docker-entrypoint-initdb.d/init-twenty-db.sh:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nextacademy-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
    container_name: nextacademy-app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URI: ${DATABASE_URI}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_ADMIN_EMAIL: ${PAYLOAD_ADMIN_EMAIL}
      PAYLOAD_ADMIN_PASSWORD: ${PAYLOAD_ADMIN_PASSWORD}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-${NEXT_PUBLIC_APP_URL}}
      REDIS_URL: ${REDIS_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME:-Next Academy}
      ENABLE_PAYMOB: ${ENABLE_PAYMOB:-true}
      PAYMOB_API_KEY: ${PAYMOB_API_KEY}
      PAYMOB_PUBLIC_KEY: ${PAYMOB_PUBLIC_KEY}
      PAYMOB_INTEGRATION_ID: ${PAYMOB_INTEGRATION_ID}
      PAYMOB_WALLET_INTEGRATION_ID: ${PAYMOB_WALLET_INTEGRATION_ID}
      PAYMOB_IFRAME_ID: ${PAYMOB_IFRAME_ID}
      PAYMOB_HMAC_SECRET: ${PAYMOB_HMAC_SECRET}
      EASYKASH_API_TOKEN: ${EASYKASH_API_TOKEN}
      EASYKASH_HMAC_SECRET: ${EASYKASH_HMAC_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CRON_SECRET: ${CRON_SECRET}
      TWENTY_CRM_URL: ${TWENTY_CRM_URL}
      TWENTY_CRM_API_KEY: ${TWENTY_CRM_API_KEY}
      CRM_SYNC_BATCH_SIZE: ${CRM_SYNC_BATCH_SIZE:-25}
      CRM_SYNC_MAX_ATTEMPTS: ${CRM_SYNC_MAX_ATTEMPTS:-5}
      CRM_SYNC_STALE_LOCK_MINUTES: ${CRM_SYNC_STALE_LOCK_MINUTES:-30}
      TWENTY_RESOURCE_CONTACTS: ${TWENTY_RESOURCE_CONTACTS:-people}
      TWENTY_RESOURCE_COMPANIES: ${TWENTY_RESOURCE_COMPANIES:-companies}
      TWENTY_RESOURCE_LEADS: ${TWENTY_RESOURCE_LEADS:-leads}
      TWENTY_RESOURCE_DEALS: ${TWENTY_RESOURCE_DEALS:-opportunities}
    volumes:
      - media_uploads:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); const req = http.get('http://localhost:3001/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.setTimeout(5000, () => { req.destroy(); process.exit(1); });\""]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: nextacademy-nginx
    restart: unless-stopped
    profiles:
      - edge
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - app
      - twenty-server
    networks:
      - internal

  certbot:
    image: certbot/certbot
    container_name: nextacademy-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Run manually: docker compose run certbot certonly --webroot ...
    profiles:
      - ssl

  # ── Twenty CRM ──────────────────────────────────────────────────────────────
  twenty-server:
    image: twentycrm/twenty:${TWENTY_TAG:-latest}
    container_name: nextacademy-twenty-server
    restart: unless-stopped
    volumes:
      - twenty_local_data:/app/packages/twenty-server/.local-storage
    environment:
      NODE_PORT: 3000
      PG_DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/twenty
      SERVER_URL: ${TWENTY_SERVER_URL:-https://crm.nextacademyedu.com}
      FRONT_BASE_URL: ${TWENTY_SERVER_URL:-https://crm.nextacademyedu.com}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      APP_SECRET: ${TWENTY_APP_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:3000/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 10

  twenty-worker:
    image: twentycrm/twenty:${TWENTY_TAG:-latest}
    container_name: nextacademy-twenty-worker
    restart: unless-stopped
    command: ["yarn", "worker:prod"]
    volumes:
      - twenty_local_data:/app/packages/twenty-server/.local-storage
    environment:
      PG_DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/twenty
      SERVER_URL: ${TWENTY_SERVER_URL:-https://crm.nextacademyedu.com}
      FRONT_BASE_URL: ${TWENTY_SERVER_URL:-https://crm.nextacademyedu.com}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      APP_SECRET: ${TWENTY_APP_SECRET}
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"
    depends_on:
      twenty-server:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  certbot_www:
  certbot_conf:
  twenty_local_data:
  media_uploads:
